name: Deploy Backend

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/zonetyper:latest ./backend
          docker push $ECR_REGISTRY/zonetyper:latest

      - name: Deploy to Beanstalk
        run: |
          zip -j deploy.zip ./backend/Dockerrun.aws.json
          aws s3 cp deploy.zip s3://elasticbeanstalk-us-east-1-${{ secrets.AWS_ACCOUNT_ID }}/deploy.zip
          aws elasticbeanstalk create-application-version \
            --application-name zonetyper \
            --version-label ${{ github.sha }} \
            --source-bundle S3Bucket="elasticbeanstalk-us-east-1-${{ secrets.AWS_ACCOUNT_ID }}",S3Key="deploy.zip"
          aws elasticbeanstalk update-environment \
            --environment-name Zonetyper-env \
            --version-label ${{ github.sha }}